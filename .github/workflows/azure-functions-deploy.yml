# Builds TypeScript in apps/api and deploys to the Linux Function App in carwoods.com.
# Uses the same Entra app + OIDC secrets as the infrastructure workflow.
# Prerequisites: infra deployed; GitHub Variables AZURE_FUNCTION_APP_NAME set.

name: Deploy Azure Functions (API)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'apps/api/**'
      - '.github/workflows/azure-functions-deploy.yml'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: azure-functions-deploy
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Function App name variable
        run: |
          if [ -z "${{ vars.AZURE_FUNCTION_APP_NAME }}" ]; then
            echo "::error::Set repository Variable AZURE_FUNCTION_APP_NAME (same as infrastructure deploy)."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install, build, production dependencies only
        working-directory: apps/api
        run: |
          npm ci
          npm run build
          npm prune --omit=dev

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ vars.AZURE_FUNCTION_APP_NAME }}
          package: ${{ github.workspace }}/apps/api
          respect-funcignore: true
          scm-do-build-during-deployment: false
