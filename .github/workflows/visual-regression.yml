name: Visual regression (Playwright, manual)

# Not tied to the default PR CI. Run this workflow when you want visual
# diff + hosted report for a specific PR: Actions → this workflow → "Run
# workflow" and enter the PR number. Rerun after adding the
# `visual-drift-accepted` label to commit accepted drift (same as before).
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to test (branch head; same-repo only for gh-pages + baseline push)
        required: true
        type: number

# Auto-commit step needs write access to push baselines back to the PR branch.
# Pushes from GITHUB_TOKEN do NOT trigger further workflow runs (per GitHub
# docs), so this can't loop.
# PR comments need issues: write on the pull request (handled via pull-requests).
permissions:
  contents: write
  pull-requests: write
  deployments: write

jobs:
  resolve:
    name: Resolve PR
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.meta.outputs.pr_number }}
      head_ref: ${{ steps.meta.outputs.head_ref }}
      head_sha: ${{ steps.meta.outputs.head_sha }}
      head_repo: ${{ steps.meta.outputs.head_repo }}
      is_same_repo: ${{ steps.meta.outputs.is_same_repo }}
      pr_labels_json: ${{ steps.meta.outputs.pr_labels_json }}
    steps:
      - name: Load PR head + labels
        id: meta
        uses: actions/github-script@v7
        with:
          script: |
            const n = parseInt(github.event.inputs.pr_number, 10);
            if (Number.isNaN(n) || n < 1) {
              core.setFailed('Invalid pr_number');
              return;
            }
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: n,
            });
            const headRepo = pr.head.repo.full_name;
            const baseRepo = `${context.repo.owner}/${context.repo.repo}`;
            const isSame = headRepo === baseRepo;
            core.setOutput('pr_number', String(n));
            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('head_repo', headRepo);
            core.setOutput('is_same_repo', isSame ? 'true' : 'false');
            core.setOutput('pr_labels_json', JSON.stringify(pr.labels.map((l) => l.name)));
            core.info(`PR #${n} head: ${headRepo}@${pr.head.ref} (same repo: ${isSame})`);

  visual:
    name: Playwright visual screenshots
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      # Builds the web app with VITE_PORTAL_DEV_AUTH=true so portal + admin
      # specs land on authenticated pages. See playwright.config.mjs:3-5,20-22.
      PORTAL_E2E: 'true'
      CI: 'true'
      # Playwright parallel workers on CI (see playwright.config.mjs workers).
      PW_CI_WORKERS: '4'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.resolve.outputs.head_repo }}
          # PR head branch (same as pull_request: head ref, not the merge ref).
          ref: ${{ needs.resolve.outputs.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # First pass: run the visual suite as-is. Pass means baselines exist and
      # match the live render — done. Fail means either (a) baselines are
      # missing for some tests, or (b) baselines exist but the page changed.
      - name: Run visual regression
        id: visual
        continue-on-error: true
        run: npm run test:visual

      # Second pass: if the first pass failed, regenerate baselines so we can
      # tell missing-from-modified apart by inspecting git status.
      - name: Regenerate baselines (for inspection)
        if: steps.visual.outcome == 'failure'
        run: npm run test:visual:update

      # The decision step. Possible states after `--update-snapshots`:
      #   - new files only                         → bootstrap, commit + push, job succeeds
      #   - modified files + `visual-drift-accepted` label → commit drift + new, job succeeds
      #   - modified files without the label        → revert drift, fail, inline preview below
      #   - both (without label)                    → bootstrap new, revert drift, fail
      #
      # Regardless of the decision, we stash before/after PNGs of each drifted
      # baseline into playwright-report/baselines/ so the gh-pages deploy can
      # serve them and the PR sticky comment can render them inline.
      - name: Auto-commit new baselines
        if: steps.visual.outcome == 'failure'
        id: bootstrap
        env:
          PR_LABELS: ${{ needs.resolve.outputs.pr_labels_json }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          MODIFIED=$(git diff --name-only -- 'e2e/visual/' || true)
          UNTRACKED=$(git ls-files --others --exclude-standard -- 'e2e/visual/' || true)

          echo "Modified baselines (drift):"
          echo "${MODIFIED:-<none>}"
          echo
          echo "New baselines (bootstrap):"
          echo "${UNTRACKED:-<none>}"

          # Stash before/after of each drifted baseline for the PR inline preview.
          # Done before any revert so `current` = committed HEAD, `updated` = post-update.
          mkdir -p playwright-report/baselines/current playwright-report/baselines/updated
          if [ -n "$MODIFIED" ]; then
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              rel="${f#e2e/visual/}"
              mkdir -p "playwright-report/baselines/current/$(dirname "$rel")"
              mkdir -p "playwright-report/baselines/updated/$(dirname "$rel")"
              cp "$f" "playwright-report/baselines/updated/$rel"
              git show "HEAD:$f" > "playwright-report/baselines/current/$rel" 2>/dev/null || true
            done <<< "$MODIFIED"
          fi

          # `toJson(...*.name)` yields a JSON array string like ["label-a","label-b"].
          ACCEPT_DRIFT="false"
          if printf '%s' "${PR_LABELS:-[]}" | grep -qF '"visual-drift-accepted"'; then
            ACCEPT_DRIFT="true"
          fi
          echo "visual-drift-accepted label present: $ACCEPT_DRIFT"

          DRIFT_ACCEPTED="false"
          if [ -n "$MODIFIED" ] && [ "$ACCEPT_DRIFT" = "true" ]; then
            echo "Label present — keeping drifted baselines staged for commit."
            DRIFT_ACCEPTED="true"
          elif [ -n "$MODIFIED" ]; then
            echo "No accept label — reverting drift so the next CI run fails against the original baselines."
            echo "$MODIFIED" | xargs git checkout --
          fi

          # Commit whatever's left (bootstrapped new files, plus accepted drift if any).
          BOOTSTRAPPED="false"
          git add -A e2e/visual/ || true
          if ! git diff --cached --quiet; then
            if [ "$DRIFT_ACCEPTED" = "true" ]; then
              git commit -m "Accept visual drift + bootstrap baselines [skip ci]"
            else
              git commit -m "Bootstrap visual regression baselines [skip ci]"
            fi
            git push origin "HEAD:refs/heads/${{ needs.resolve.outputs.head_ref }}"
            BOOTSTRAPPED="true"
          fi

          {
            echo "modified_files<<MODEOF"
            echo "$MODIFIED"
            echo "MODEOF"
            echo "drift=$([ -n "$MODIFIED" ] && echo true || echo false)"
            echo "drift_accepted=$DRIFT_ACCEPTED"
            echo "bootstrapped=$BOOTSTRAPPED"
          } >> "$GITHUB_OUTPUT"

      # Job outcome:
      #   - First pass green                                              → no-op
      #   - First pass red, only missing baselines                        → bootstrapped, exit success
      #   - First pass red, drift + `visual-drift-accepted` label         → committed, exit success
      #   - First pass red, drift without the label                       → fail; reviewer inspects the inline preview
      - name: Report job outcome
        if: steps.visual.outcome == 'failure'
        run: |
          if [ "${{ steps.bootstrap.outputs.drift_accepted }}" = "true" ]; then
            echo "Drift accepted via 'visual-drift-accepted' label; updated baselines committed."
            exit 0
          fi
          if [ "${{ steps.bootstrap.outputs.drift }}" = "true" ]; then
            echo "::error::Visual drift detected. Review the before/after images in the PR sticky comment, then add the 'visual-drift-accepted' label to accept (or run 'npm run test:visual:update' locally)."
            exit 1
          fi
          if [ "${{ steps.bootstrap.outputs.bootstrapped }}" = "true" ]; then
            echo "Bootstrapped missing baselines; pushed back to branch."
          fi

      # Puts gallery.html + snapshot PNG folders next to Playwright's index.html so one artifact
      # (and one gh-pages deploy) includes the grid view from scripts/generateVisualSnapshotGallery.mjs.
      - name: Stage snapshot gallery into Playwright report
        if: always()
        run: |
          set -euo pipefail
          SRC="e2e/visual"
          DEST="playwright-report"
          if [ ! -f "${SRC}/visual-gallery.html" ]; then
            echo "No ${SRC}/visual-gallery.html — skipping gallery bundle."
            exit 0
          fi
          mkdir -p "${DEST}"
          cp "${SRC}/visual-gallery.html" "${DEST}/gallery.html"
          for d in "${SRC}"/*.mjs-snapshots; do
            [ -d "$d" ] || continue
            rm -rf "${DEST}/$(basename "$d")"
            cp -r "$d" "${DEST}/"
          done
          if [ -d "${SRC}/.gallery-runtime" ]; then
            rm -rf "${DEST}/.gallery-runtime"
            cp -r "${SRC}/.gallery-runtime" "${DEST}/"
          fi
          echo "Bundled snapshot gallery as ${DEST}/gallery.html"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test-results (diffs, traces)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 14

      # Publish HTML report under gh-pages/visual/pr/<number>/ (same pattern as Vercel Preview paths).
      # Requires GitHub Pages from branch gh-pages (repo Settings → Pages). keep_files preserves the
      # existing site root (e.g. carwoods.com deploy from build/). Fork PRs skip — no token to base gh-pages.
      - name: Deploy Playwright report to gh-pages (PR preview path)
        id: gh_pages_deploy
        if: >
          always() &&
          needs.resolve.outputs.is_same_repo == 'true' &&
          hashFiles('playwright-report/index.html') != ''
        continue-on-error: true
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: playwright-report
          destination_dir: visual/pr/${{ needs.resolve.outputs.pr_number }}
          keep_files: true

      # Surfaces the hosted Playwright report under repo → Environments → visual-regression (like a preview URL).
      - name: Register GitHub deployment (Environment UI)
        if: always() && needs.resolve.outputs.is_same_repo == 'true'
        continue-on-error: true
        env:
          PAGES_DEPLOY_OUTCOME: ${{ steps.gh_pages_deploy.outcome }}
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const prNumber = parseInt(process.env.PR_NUMBER || '', 10);
            if (Number.isNaN(prNumber)) {
              core.setFailed('PR_NUMBER missing for deployment registration.');
              return;
            }

            const { owner, repo } = context.repo;
            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            });
            const workspace = process.env.GITHUB_WORKSPACE || '.';
            const hasReport = fs.existsSync(path.join(workspace, 'playwright-report', 'index.html'));
            const pagesOutcome = process.env.PAGES_DEPLOY_OUTCOME || 'skipped';
            const previewUrl = `https://${owner}.github.io/${repo}/visual/pr/${pr.number}/index.html`;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const environment = 'visual-regression';

            /** @type {'success' | 'failure' | 'inactive'} */
            let state = 'inactive';
            let environmentUrl = '';
            if (pagesOutcome === 'success') {
              state = 'success';
              environmentUrl = previewUrl;
            } else if (pagesOutcome === 'failure') {
              state = 'failure';
            } else if (!hasReport) {
              core.info('No playwright-report/index.html and Pages deploy did not succeed; skipping deployment registration.');
              return;
            } else {
              state = 'inactive';
            }

            const deployment = await github.rest.repos.createDeployment({
              owner,
              repo,
              ref: pr.head.sha,
              environment,
              auto_merge: false,
              required_contexts: [],
              transient_environment: true,
              production_environment: false,
              description: `Playwright visual report for PR #${pr.number}`,
            });

            const deploymentId = deployment.data.id;

            await github.rest.repos.createDeploymentStatus({
              owner,
              repo,
              deployment_id: deploymentId,
              state,
              environment_url: environmentUrl || undefined,
              log_url: runUrl,
              auto_inactive: true,
            });
            core.info(`Registered deployment ${deploymentId} (${state}) for ${environment}`);

      - name: Write PR comment body (visual regression links)
        if: always()
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          HEAD_REPO: ${{ needs.resolve.outputs.head_repo }}
          BASE_REPO: ${{ github.repository }}
          PAGES_DEPLOY_OUTCOME: ${{ steps.gh_pages_deploy.outcome }}
          DRIFT: ${{ steps.bootstrap.outputs.drift }}
          DRIFT_ACCEPTED: ${{ steps.bootstrap.outputs.drift_accepted }}
          MODIFIED_FILES: ${{ steps.bootstrap.outputs.modified_files }}
        run: |
          set -euo pipefail
          PREVIEW_URL="https://${OWNER}.github.io/${REPO}/visual/pr/${PR_NUMBER}/index.html"
          GALLERY_URL="https://${OWNER}.github.io/${REPO}/visual/pr/${PR_NUMBER}/gallery.html"
          BASE_URL="https://${OWNER}.github.io/${REPO}/visual/pr/${PR_NUMBER}"
          SAME_REPO="false"
          [ "${HEAD_REPO}" = "${BASE_REPO}" ] && SAME_REPO="true"

          {
            echo "## Visual regression (${JOB_STATUS})"
            echo ""
            echo "- **Workflow run:** [${{ github.run_id }}](${RUN_URL})"
            echo ""
            if [ "${SAME_REPO}" = "true" ]; then
              echo "- **Playwright HTML report (hosted):** [Open report](${PREVIEW_URL})"
              echo "- **Snapshot gallery (all PNGs, hosted):** [Open gallery](${GALLERY_URL})"
              echo "  - Requires **Settings → Pages** publishing from the \`gh-pages\` branch (project URL is usually \`https://${OWNER}.github.io/${REPO}/\`)."
              if [ "${PAGES_DEPLOY_OUTCOME}" = "failure" ]; then
                echo "  - **Deploy failed** — use **Artifacts → playwright-report** below or check the \`Deploy Playwright report to gh-pages\` step log."
              elif [ "${PAGES_DEPLOY_OUTCOME}" = "skipped" ]; then
                echo "  - **Hosted deploy skipped** (no \`playwright-report/index.html\` on disk — e.g. job failed before Playwright wrote the report)."
              fi
            else
              echo "- **Hosted preview:** not published for fork PRs (Pages deploy only runs for branches on this repository)."
            fi
            echo ""
            echo "- **Artifacts:** **Artifacts** → **playwright-report** — unzip and open \`index.html\` (Playwright UI) or \`gallery.html\` (screenshot grid)."
          } > visual-regression-pr-comment.md

          # Inline before/after preview for drifted snapshots — only when drift exists
          # AND we deployed to gh-pages (fork PRs can't host images the comment can load).
          if [ "${DRIFT}" = "true" ] && [ "${SAME_REPO}" = "true" ] && [ "${PAGES_DEPLOY_OUTCOME}" = "success" ]; then
            {
              echo ""
              if [ "${DRIFT_ACCEPTED}" = "true" ]; then
                echo "### Changed snapshots (accepted — committed to the branch)"
              else
                echo "### Changed snapshots"
                echo ""
                echo "Review the before/after pairs below. If the new renders look correct, add the \`visual-drift-accepted\` label to this PR and the workflow will commit the updated baselines on the next run."
              fi
              echo ""
              echo "_Snapshot paths are relative to \`e2e/visual/\`._"
              echo ""
            } >> visual-regression-pr-comment.md

            # Emit one <details> block per drifted baseline, each with a 2-col table.
            # The label under each image disambiguates which column you're looking at
            # even when only one side renders.
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              rel="${f#e2e/visual/}"
              {
                echo "<details><summary><code>${rel}</code></summary>"
                echo ""
                echo "| Before (committed baseline) | After (this PR) |"
                echo "| --- | --- |"
                echo "| <img src=\"${BASE_URL}/baselines/current/${rel}\" alt=\"before\" width=\"480\"> | <img src=\"${BASE_URL}/baselines/updated/${rel}\" alt=\"after\" width=\"480\"> |"
                echo ""
                echo "</details>"
                echo ""
              } >> visual-regression-pr-comment.md
            done <<< "${MODIFIED_FILES}"
          elif [ "${DRIFT}" = "true" ]; then
            {
              echo ""
              echo "### Changed snapshots"
              echo ""
              echo "Drift detected but inline preview is unavailable (fork PR or gh-pages deploy did not succeed). Download the **playwright-report** artifact to inspect."
              echo ""
            } >> visual-regression-pr-comment.md
          fi

      - name: Job summary (quick links)
        if: always()
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number || '' }}
          HEAD_REPO: ${{ needs.resolve.outputs.head_repo || '' }}
          BASE_REPO: ${{ github.repository }}
          PAGES_DEPLOY_OUTCOME: ${{ steps.gh_pages_deploy.outcome }}
        run: |
          {
            echo "## Visual regression (${JOB_STATUS})"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Workflow run | [Open](${RUN_URL}) |"
            if [ "${EVENT_NAME}" = "workflow_dispatch" ] && [ -n "${PR_NUMBER}" ] && [ "${HEAD_REPO}" = "${BASE_REPO}" ]; then
              PREVIEW_URL="https://${OWNER}.github.io/${REPO}/visual/pr/${PR_NUMBER}/index.html"
              GALLERY_URL="https://${OWNER}.github.io/${REPO}/visual/pr/${PR_NUMBER}/gallery.html"
              echo "| Hosted Playwright report | [index.html](${PREVIEW_URL}) |"
              echo "| Hosted snapshot gallery | [gallery.html](${GALLERY_URL}) |"
              if [ "${PAGES_DEPLOY_OUTCOME}" != "success" ]; then
                echo "| Hosted previews | _Pages deploy was not successful — use the playwright-report artifact._ |"
              fi
            elif [ "${EVENT_NAME}" = "workflow_dispatch" ] && [ -n "${PR_NUMBER}" ]; then
              echo "| Hosted previews | _Fork PR — use artifacts only._ |"
            fi
            echo "| Local (artifact) | Download **playwright-report**, open \`index.html\` or \`gallery.html\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on PR with report links (sticky)
        if: always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          number: ${{ needs.resolve.outputs.pr_number }}
          header: visual-regression-report
          path: visual-regression-pr-comment.md
          skip_unchanged: false
