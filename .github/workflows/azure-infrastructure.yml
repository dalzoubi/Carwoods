# Provisions Azure resources for the tenant portal API into resource group **carwoods.com** only (East US 2).
# Uses OpenID Connect (no client secret in GitHub).
# Full runbook: Entra federated credential subjects, RBAC, GitHub secrets/variables, naming rules, troubleshooting → infra/azure/README.md

name: Azure infrastructure

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'What-if only (show changes, do not apply)'
        type: choice
        options:
          - 'false'
          - 'true'
        default: 'false'
      run_migrations:
        description: 'Apply DB migrations after deploy'
        type: choice
        options:
          - 'true'
          - 'false'
        default: 'true'
      location:
        description: 'Azure region for the resource group (if creating)'
        type: string
        default: eastus2
  push:
    branches:
      - main
    paths:
      - 'infra/azure/main.bicep'
      - 'infra/db/migrations/**'
      - '.github/workflows/azure-infrastructure.yml'

permissions:
  id-token: write
  contents: read

env:
  AZURE_RESOURCE_GROUP: carwoods.com

jobs:
  deploy:
    name: Deploy Bicep to carwoods.com
    runs-on: ubuntu-latest
    concurrency:
      group: azure-infra-carwoods-com
      cancel-in-progress: false
    outputs:
      sql_fqdn: ${{ steps.outputs.outputs.sql_fqdn }}
      sql_database: ${{ steps.outputs.outputs.sql_database }}
      # true when this run actually deployed (not a dry-run)
      deployed: ${{ steps.outputs.outputs.deployed }}

    steps:
      - name: Enforce resource group name
        run: |
          if [ "${{ env.AZURE_RESOURCE_GROUP }}" != "carwoods.com" ]; then
            echo "::error::Workflow must target resource group carwoods.com"
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Resolve Azure region
        id: region
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "location=${{ github.event.inputs.location }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ vars.AZURE_LOCATION }}" ]; then
            echo "location=${{ vars.AZURE_LOCATION }}" >> "$GITHUB_OUTPUT"
          else
            echo "location=eastus2" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Bicep CLI
        run: |
          az bicep install
          az bicep version

      - name: Validate Bicep
        run: az bicep build --file infra/azure/main.bicep

      - name: Check required repository variables and secrets
        env:
          FUNCTION_APP_NAME: ${{ vars.AZURE_FUNCTION_APP_NAME }}
          STORAGE_ACCOUNT_NAME: ${{ vars.AZURE_STORAGE_ACCOUNT_NAME }}
          SQL_SERVER_NAME: ${{ vars.AZURE_SQL_SERVER_NAME }}
          SQL_ADMIN_PASSWORD: ${{ secrets.AZURE_SQL_ADMIN_PASSWORD }}
        run: |
          if [ -z "$FUNCTION_APP_NAME" ] || [ -z "$STORAGE_ACCOUNT_NAME" ]; then
            echo "::error::Set GitHub repository Variables: AZURE_FUNCTION_APP_NAME and AZURE_STORAGE_ACCOUNT_NAME (globally unique, see infra/azure/README.md)."
            exit 1
          fi
          if [ -z "$SQL_SERVER_NAME" ]; then
            echo "::error::Set GitHub repository Variable AZURE_SQL_SERVER_NAME (globally unique Azure SQL logical server name, 1–63 chars, lowercase letters, numbers, hyphens — see infra/azure/README.md)."
            exit 1
          fi
          if [ -z "$SQL_ADMIN_PASSWORD" ]; then
            echo "::error::Set GitHub repository Secret AZURE_SQL_ADMIN_PASSWORD (Azure SQL admin password; min 8 chars, must include uppercase, lowercase, digit, special — see infra/azure/README.md)."
            exit 1
          fi

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group exists
        run: |
          az group create \
            --name "${{ env.AZURE_RESOURCE_GROUP }}" \
            --location "${{ steps.region.outputs.location }}" \
            --output none

      - name: Detect existing Function App
        id: detect_app
        env:
          FUNCTION_APP_NAME: ${{ vars.AZURE_FUNCTION_APP_NAME }}
        run: |
          if az functionapp show \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --name "$FUNCTION_APP_NAME" \
            --query id -o tsv >/dev/null 2>&1; then
            echo "adopt_existing=true" >> "$GITHUB_OUTPUT"
          else
            echo "adopt_existing=false" >> "$GITHUB_OUTPUT"
          fi

      - name: What-if (dry run)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' }}
        env:
          FUNCTION_APP_NAME: ${{ vars.AZURE_FUNCTION_APP_NAME }}
          STORAGE_ACCOUNT_NAME: ${{ vars.AZURE_STORAGE_ACCOUNT_NAME }}
          SQL_SERVER_NAME: ${{ vars.AZURE_SQL_SERVER_NAME }}
          SQL_ADMIN_PASSWORD: ${{ secrets.AZURE_SQL_ADMIN_PASSWORD }}
        run: |
          az deployment group what-if \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --template-file infra/azure/main.bicep \
            --parameters \
              functionAppName="$FUNCTION_APP_NAME" \
              storageAccountName="$STORAGE_ACCOUNT_NAME" \
              sqlServerName="$SQL_SERVER_NAME" \
              sqlAdminPassword="$SQL_ADMIN_PASSWORD" \
              adoptExistingFunctionApp="${{ steps.detect_app.outputs.adopt_existing }}"

      - name: Deploy Bicep
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true') }}
        env:
          FUNCTION_APP_NAME: ${{ vars.AZURE_FUNCTION_APP_NAME }}
          STORAGE_ACCOUNT_NAME: ${{ vars.AZURE_STORAGE_ACCOUNT_NAME }}
          SQL_SERVER_NAME: ${{ vars.AZURE_SQL_SERVER_NAME }}
          SQL_ADMIN_PASSWORD: ${{ secrets.AZURE_SQL_ADMIN_PASSWORD }}
        run: |
          az deployment group create \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --template-file infra/azure/main.bicep \
            --name "carwoods-infra-${{ github.run_id }}" \
            --parameters \
              functionAppName="$FUNCTION_APP_NAME" \
              storageAccountName="$STORAGE_ACCOUNT_NAME" \
              sqlServerName="$SQL_SERVER_NAME" \
              sqlAdminPassword="$SQL_ADMIN_PASSWORD" \
              adoptExistingFunctionApp="${{ steps.detect_app.outputs.adopt_existing }}" \
            --output none

      - name: Capture deployment outputs
        id: outputs
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true') }}
        run: |
          DEPLOY_JSON=$(az deployment group show \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --name "carwoods-infra-${{ github.run_id }}" \
            --query properties.outputs \
            -o json)
          echo "$DEPLOY_JSON"
          SQL_FQDN=$(echo "$DEPLOY_JSON" | jq -r '.sqlServerFqdn.value')
          SQL_DB=$(echo "$DEPLOY_JSON" | jq -r '.sqlDatabaseNameOut.value')
          echo "sql_fqdn=$SQL_FQDN" >> "$GITHUB_OUTPUT"
          echo "sql_database=$SQL_DB" >> "$GITHUB_OUTPUT"
          echo "deployed=true" >> "$GITHUB_OUTPUT"

  db-migrate:
    name: Apply DB migrations
    needs: deploy
    # Skip on dry-run, or when the caller explicitly opts out
    if: |
      needs.deploy.outputs.deployed == 'true' &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.run_migrations == 'true')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install sqlcmd (go-sqlcmd)
        run: |
          # Install the go-sqlcmd binary directly — works on Ubuntu 22 and 24.
          SQLCMD_VERSION=$(curl -sSL \
            https://api.github.com/repos/microsoft/go-sqlcmd/releases/latest \
            | jq -r '.tag_name' | sed 's/^v//')
          curl -sSL \
            "https://github.com/microsoft/go-sqlcmd/releases/download/v${SQLCMD_VERSION}/sqlcmd-linux-amd64.tar.bz2" \
            | sudo tar -xj -C /usr/local/bin sqlcmd
          sqlcmd --version

      - name: Run migrations (idempotent)
        env:
          SQL_FQDN: ${{ needs.deploy.outputs.sql_fqdn }}
          SQL_DATABASE: ${{ needs.deploy.outputs.sql_database }}
          SQL_ADMIN_PASSWORD: ${{ secrets.AZURE_SQL_ADMIN_PASSWORD }}
          SQL_ADMIN_USER: ${{ vars.AZURE_SQL_ADMIN_USER }}
        run: |
          set -euo pipefail

          HOST="${SQL_FQDN},1433"
          DB="$SQL_DATABASE"
          USER="${SQL_ADMIN_USER:-carwoodsadmin}"
          PASS="$SQL_ADMIN_PASSWORD"

          run_sql() {
            sqlcmd -S "$HOST" -d "$DB" -U "$USER" -P "$PASS" \
              -C -l 30 -t 120 "$@"
          }

          echo "→ Ensuring __migrations tracking table exists"
          run_sql -Q "
            IF NOT EXISTS (
              SELECT 1 FROM sys.tables
              WHERE name = '__migrations' AND schema_id = SCHEMA_ID('dbo')
            )
            CREATE TABLE dbo.__migrations (
              name        NVARCHAR(200) NOT NULL PRIMARY KEY,
              applied_at  DATETIMEOFFSET NOT NULL DEFAULT SYSDATETIMEOFFSET()
            );"

          apply_migration() {
            local NAME="$1"
            local FILE="$2"

            # Check if already applied
            APPLIED=$(run_sql -h -1 -Q "
              SET NOCOUNT ON;
              SELECT COUNT(*) FROM dbo.__migrations WHERE name = '${NAME}';" \
              | tr -d '[:space:]')

            if [ "$APPLIED" = "1" ]; then
              echo "  ✓ $NAME — already applied, skipping"
              return
            fi

            echo "  → Applying $NAME …"
            run_sql -i "$FILE"
            run_sql -Q "
              INSERT INTO dbo.__migrations (name) VALUES ('${NAME}');"
            echo "  ✓ $NAME — done"
          }

          shopt -s nullglob
          MIGRATION_FILES=(infra/db/migrations/[0-9][0-9][0-9]_*.sql)

          if [ ${#MIGRATION_FILES[@]} -eq 0 ]; then
            echo "::error::No migration files found in infra/db/migrations/"
            exit 1
          fi

          echo "→ Applying migrations discovered on disk:"
          printf '  - %s\n' "${MIGRATION_FILES[@]}"

          for FILE in "${MIGRATION_FILES[@]}"; do
            NAME="$(basename "$FILE" .sql)"
            apply_migration "$NAME" "$FILE"
          done

          echo "All migrations applied."
