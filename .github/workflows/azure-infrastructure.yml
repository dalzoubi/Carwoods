# Provisions Azure resources for the tenant portal API into resource group **carwoods.com** only (East US 2).
# Uses OpenID Connect (no client secret in GitHub).
# Full runbook: Entra federated credential subjects, RBAC, GitHub secrets/variables, naming rules, troubleshooting → infra/azure/README.md

name: Azure infrastructure

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'What-if only (show changes, do not apply)'
        type: choice
        options:
          - 'false'
          - 'true'
        default: 'false'
      location:
        description: 'Azure region for the resource group (if creating)'
        type: string
        default: eastus2
  push:
    branches:
      - main
    paths:
      - 'infra/azure/main.bicep'
      - '.github/workflows/azure-infrastructure.yml'

permissions:
  id-token: write
  contents: read

env:
  AZURE_RESOURCE_GROUP: carwoods.com

jobs:
  deploy:
    name: Deploy Bicep to carwoods.com
    runs-on: ubuntu-latest
    concurrency:
      group: azure-infra-carwoods-com
      cancel-in-progress: false
    outputs:
      sql_fqdn: ${{ steps.outputs.outputs.sql_fqdn }}
      sql_database: ${{ steps.outputs.outputs.sql_database }}
      # true when this run actually deployed (not a dry-run)
      deployed: ${{ steps.outputs.outputs.deployed }}

    steps:
      - name: Enforce resource group name
        run: |
          if [ "${{ env.AZURE_RESOURCE_GROUP }}" != "carwoods.com" ]; then
            echo "::error::Workflow must target resource group carwoods.com"
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Resolve Azure region
        id: region
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "location=${{ github.event.inputs.location }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ vars.AZURE_LOCATION }}" ]; then
            echo "location=${{ vars.AZURE_LOCATION }}" >> "$GITHUB_OUTPUT"
          else
            echo "location=eastus2" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Bicep CLI
        run: |
          az bicep install
          az bicep version

      - name: Validate Bicep
        run: az bicep build --file infra/azure/main.bicep

      - name: Check required repository variables and secrets
        env:
          FUNCTION_APP_NAME: ${{ vars.AZURE_FUNCTION_APP_NAME }}
          STORAGE_ACCOUNT_NAME: ${{ vars.AZURE_STORAGE_ACCOUNT_NAME }}
          SQL_SERVER_NAME: ${{ vars.AZURE_SQL_SERVER_NAME }}
          SQL_ADMIN_PASSWORD: ${{ secrets.AZURE_SQL_ADMIN_PASSWORD }}
        run: |
          if [ -z "$FUNCTION_APP_NAME" ] || [ -z "$STORAGE_ACCOUNT_NAME" ]; then
            echo "::error::Set GitHub repository Variables: AZURE_FUNCTION_APP_NAME and AZURE_STORAGE_ACCOUNT_NAME (globally unique, see infra/azure/README.md)."
            exit 1
          fi
          if [ -z "$SQL_SERVER_NAME" ]; then
            echo "::error::Set GitHub repository Variable AZURE_SQL_SERVER_NAME (globally unique Azure SQL logical server name, 1–63 chars, lowercase letters, numbers, hyphens — see infra/azure/README.md)."
            exit 1
          fi
          if [ -z "$SQL_ADMIN_PASSWORD" ]; then
            echo "::error::Set GitHub repository Secret AZURE_SQL_ADMIN_PASSWORD (Azure SQL admin password; min 8 chars, must include uppercase, lowercase, digit, special — see infra/azure/README.md)."
            exit 1
          fi

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group exists
        run: |
          az group create \
            --name "${{ env.AZURE_RESOURCE_GROUP }}" \
            --location "${{ steps.region.outputs.location }}" \
            --output none

      - name: Detect existing Function App
        id: detect_app
        env:
          FUNCTION_APP_NAME: ${{ vars.AZURE_FUNCTION_APP_NAME }}
        run: |
          if az functionapp show \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --name "$FUNCTION_APP_NAME" \
            --query id -o tsv >/dev/null 2>&1; then
            echo "adopt_existing=true" >> "$GITHUB_OUTPUT"
          else
            echo "adopt_existing=false" >> "$GITHUB_OUTPUT"
          fi

      - name: What-if (dry run)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' }}
        env:
          FUNCTION_APP_NAME: ${{ vars.AZURE_FUNCTION_APP_NAME }}
          STORAGE_ACCOUNT_NAME: ${{ vars.AZURE_STORAGE_ACCOUNT_NAME }}
          SQL_SERVER_NAME: ${{ vars.AZURE_SQL_SERVER_NAME }}
          SQL_ADMIN_PASSWORD: ${{ secrets.AZURE_SQL_ADMIN_PASSWORD }}
        run: |
          az deployment group what-if \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --template-file infra/azure/main.bicep \
            --parameters \
              functionAppName="$FUNCTION_APP_NAME" \
              storageAccountName="$STORAGE_ACCOUNT_NAME" \
              sqlServerName="$SQL_SERVER_NAME" \
              sqlAdminPassword="$SQL_ADMIN_PASSWORD" \
              adoptExistingFunctionApp="${{ steps.detect_app.outputs.adopt_existing }}"

      - name: Deploy Bicep
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true') }}
        env:
          FUNCTION_APP_NAME: ${{ vars.AZURE_FUNCTION_APP_NAME }}
          STORAGE_ACCOUNT_NAME: ${{ vars.AZURE_STORAGE_ACCOUNT_NAME }}
          SQL_SERVER_NAME: ${{ vars.AZURE_SQL_SERVER_NAME }}
          SQL_ADMIN_PASSWORD: ${{ secrets.AZURE_SQL_ADMIN_PASSWORD }}
        run: |
          az deployment group create \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --template-file infra/azure/main.bicep \
            --name "carwoods-infra-${{ github.run_id }}" \
            --parameters \
              functionAppName="$FUNCTION_APP_NAME" \
              storageAccountName="$STORAGE_ACCOUNT_NAME" \
              sqlServerName="$SQL_SERVER_NAME" \
              sqlAdminPassword="$SQL_ADMIN_PASSWORD" \
              adoptExistingFunctionApp="${{ steps.detect_app.outputs.adopt_existing }}" \
            --output none

      - name: Capture deployment outputs
        id: outputs
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true') }}
        run: |
          DEPLOY_JSON=$(az deployment group show \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --name "carwoods-infra-${{ github.run_id }}" \
            --query properties.outputs \
            -o json)
          echo "$DEPLOY_JSON"
          SQL_FQDN=$(echo "$DEPLOY_JSON" | jq -r '.sqlServerFqdn.value')
          SQL_DB=$(echo "$DEPLOY_JSON" | jq -r '.sqlDatabaseNameOut.value')
          echo "sql_fqdn=$SQL_FQDN" >> "$GITHUB_OUTPUT"
          echo "sql_database=$SQL_DB" >> "$GITHUB_OUTPUT"
          echo "deployed=true" >> "$GITHUB_OUTPUT"

